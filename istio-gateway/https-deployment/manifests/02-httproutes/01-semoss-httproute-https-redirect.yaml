# ======================================================================
# HTTPRoute - SSL Redirect
# ======================================================================
# Purpose: Redirects HTTP traffic to HTTPS
# Ingress Rule Served:
#   - nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
#  
# Traffic Flow:
#
# Notes:
#   - SSL redirect requires a HTTPRoute
#   - By itself it does not route to any services and only changes 
#     the http to https returning an http code
#   
# ======================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: semoss-httroute-https-redirect
  namespace: semoss
spec:
  parentRefs:
  - name: semoss-gateway
    sectionName: http  # Bind to HTTP listener only
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
