# ======================================================================
# HTTPRoute - SSL Redirect
# ======================================================================
# Purpose: Creates the Envoy Gateway class (GC)
#
# Notes:
#   - The Envoy GC is not created by default
#   - Global scope
#   
# ======================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller