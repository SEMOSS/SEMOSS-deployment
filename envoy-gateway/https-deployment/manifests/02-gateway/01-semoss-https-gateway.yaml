# ======================================================================
# Gateway - HTTP and HTTPS listener
# ======================================================================
# Purpose: Creates a loadbalancer with both HTTP and HTTPS
#          listeners redirecting all HTTP traffic to HTTPS
# 
# Notes:
#   - Gateway allows the use of cloud provider controllers
#     like the AWS LoadBalancer controller using 
#     infrastructure annotations
#   - Envoy needs a certificate to terminate the TLS connection
#   
# ======================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: semoss-envoy-gateway
  namespace: semoss-envoy
spec:
  infrastructure:
    annotations:
      # creating an internal NLB
      service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
      # Loadbalancer can be either internal or external
      service.beta.kubernetes.io/aws-load-balancer-internal: "false"
      # adding SecurityGroup
      service.beta.kubernetes.io/aws-load-balancer-security-groups: "sg-xxxxxx"
  gatewayClassName: envoy
  listeners:
  # HTTP listener for redirect
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
  # HTTPS listener
  - name: https
    protocol: HTTPS
    port: 443
    allowedRoutes:
      namespaces:
        from: Same
    # Using self-signed cert because the AWS NLB REQUIRES an ACM certificate
    tls:
      mode: Terminate
      certificateRefs:
      - name: semoss-tls-cert