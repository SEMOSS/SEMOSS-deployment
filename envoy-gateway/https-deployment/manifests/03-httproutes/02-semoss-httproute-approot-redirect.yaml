# ======================================================================
# HTTPRoute - App-root Redirect (HTTPS)
# ======================================================================
# Purpose: Redirects HTTPS traffic to '/SemossWeb'
#
# Ingress Rules Served:
#   - nginx.ingress.kubernetes.io/app-root: /SemossWeb
#
# =====================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: semoss-httproute-approot-redirect
  namespace: semoss-envoy
spec:
  parentRefs:
  - name: semoss-envoy-gateway
    sectionName: https
  rules:
  # Rule 1: Redirect root to /SemossWeb
  - matches:
    - path:
        type: Exact
        value: /
    filters:
    - type: RequestRedirect
      requestRedirect:
        path:
          type: ReplaceFullPath
          replaceFullPath: /SemossWeb
        statusCode: 302

  # Rule 2: Normal routing for all other paths
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: semoss-service
      port: 8080